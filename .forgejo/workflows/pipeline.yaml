name: HelmChart Version Update
on:
  schedule:
    - cron: '11 1 * * 5' # Every Friday at 01:11 AM
  workflow_dispatch:
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  update-helm-versions:
    runs-on: act
    steps:
      - uses: actions/checkout@v6
      - name: Set up tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl skopeo
          wget https://github.com/mikefarah/yq/releases/download/v4.53.2/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
      - name: Find and update HelmChart versions
        run: |
          while read -r file <&3; do
            echo "Processing file: $file"
            if yq eval -e 'select(.apiVersion == "helm.cattle.io/v1" and .kind == "HelmChart") | select(. != null)' "$file" &>/dev/null; then
              chart_name=$(yq eval '.metadata.name' "$file")
              chart_repo=$(yq eval '.spec.repo' "$file")
              chart_chart=$(yq eval '.spec.chart' "$file")
              current_version=$(yq eval '.spec.version' "$file")
              
              if [ -n "$chart_repo" ] && [ -n "$chart_chart" ]; then
                # Handle OCI repos
                if [[ "$chart_chart" == oci://* ]]; then
                  echo "  Checking OCI registry: $chart_chart"
                  latest_version=$(skopeo list-tags "docker://${chart_chart#oci://}" 2>/dev/null | jq -r '.Tags[]' | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
                # Handle HTTP(S) repos
                else
                  echo "  Checking Helm repo: $chart_repo for chart: $chart_chart"
                  if [[ "$chart_repo" == https://* ]] || [[ "$chart_repo" == http://* ]]; then
                    echo "  Fetching index from: $chart_repo"
                    index_url="$chart_repo/index.yaml"
                    index=$(curl -s "$index_url")
                    latest_version=$(echo "$index" | yq eval ".entries.\"$chart_chart\"[] | select(.version | test(\"^[0-9]+\\\\.[0-9]+\\\\.[0-9]+$\") | not | . == false) | .version" - | sort -V | tail -1)
                    if [ -z "$latest_version" ] || [ "$latest_version" == "null" ]; then
                      latest_version=$(echo "$index" | yq eval ".entries.\"$chart_chart\"[0].version" -)
                    fi
                  fi
                fi
                
                if [ -n "$latest_version" ] && [ "$latest_version" != "$current_version" ] && [ "$latest_version" != "null" ]; then
                  echo "  Latest version: $latest_version"
                  sed -i "s|  version:.*|  version: $latest_version|" "$file"
                  echo "  Updated to: $latest_version"
                else
                  echo "  No update needed (latest: $latest_version)"
                fi
              fi
            fi
          done 3< <(find . \( -name "*.yaml" -o -name "*.yml" \))
      - name: Create PR via Forgejo API and assign owner
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes detected, skipping PR creation."
            exit 0
          fi

          base_branch=$(git rev-parse --abbrev-ref HEAD)
          branch_name="chore/helmchart-version-update-$(date +%Y%m%d%H%M%S)"

          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@users.noreply.local"

          git checkout -b "$branch_name"
          git add -A
          git commit -m "chore: update HelmChart versions"
          git push origin "$branch_name"

          token="${FORGEJO_TOKEN:-}"
          if [ -z "$token" ]; then
            echo "github.token is required"
            exit 1
          fi

          repo="${GITHUB_REPOSITORY:-}"
          if [ -z "$repo" ]; then
            echo "GITHUB_REPOSITORY is not set"
            exit 1
          fi

          api_url="${GITHUB_API_URL:-}"
          if [ -z "$api_url" ]; then
            server_url="${GITHUB_SERVER_URL:-}"
            if [ -n "$server_url" ]; then
              api_url="${server_url%/}/api/v1"
            else
              echo "Could not determine Forgejo API URL"
              exit 1
            fi
          fi


          pr_title="chore: update HelmChart versions"
          pr_body="Automated HelmChart version updates generated by scheduled workflow."

          existing_pr=$(curl -fsSL \
            -H "Authorization: token $token" \
            -H "Accept: application/json" \
            "$api_url/repos/$repo/pulls?state=open&head=${{ github.repository_owner }}:${branch_name}" \
            | jq -r '.[0].number // empty')

          if [ -n "$existing_pr" ]; then
            pr_number="$existing_pr"
            echo "Open PR already exists: #$pr_number"
          else
            pr_payload=$(jq -n \
              --arg title "$pr_title" \
              --arg body "$pr_body" \
              --arg head "$branch_name" \
              --arg base "$base_branch" \
              --arg assignee "${{ github.repository_owner }}" \
              '{title: $title, body: $body, head: $head, base: $base, assignee: $assignee}')

            pr_response=$(curl -fsSL -X POST \
              -H "Authorization: token $token" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "$pr_payload" \
              "$api_url/repos/$repo/pulls")

            pr_number=$(echo "$pr_response" | jq -r '.number // empty')
            if [ -z "$pr_number" ]; then
              echo "Failed to create PR"
              echo "$pr_response"
              exit 1
            fi
            echo "Created PR #$pr_number"
          fi

