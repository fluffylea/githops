apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  chart: oci://quay.io/jetstack/charts/cert-manager
  version: v1.20.2
  targetNamespace: cert-manager
  createNamespace: true
  set:
    crds.enabled: "true"
    config.enableGatewayAPI: "true"