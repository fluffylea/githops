apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: fbi@apicrim.es
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        webhook:
          groupName: acme.fabmade.de
          solverName: ionos
          config:
            apiUrl: https://api.hosting.ionos.com/dns/v1
            publicKeySecretRef:
              name: ionos-secret
              key: IONOS_PUBLIC_PREFIX
            secretKeySecretRef:
              name: ionos-secret
              key: IONOS_SECRET
      selector:
        dnsNames:
        - becutewith.me
        - "*.becutewith.me"
    - http01:
        ingress:
          ingressClassName: nginx